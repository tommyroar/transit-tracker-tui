name: Build and Package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Unit Tests (branch coverage)
        env:
          TRANSIT_TRACKER_TESTING: "1"
        run: uv run pytest -v -m "unit" --cov --cov-branch --cov-report=term-missing

      - name: Integration Tests
        env:
          TRANSIT_TRACKER_TESTING: "1"
        run: uv run pytest -v -m "integration"

      - name: Contract Tests
        env:
          TRANSIT_TRACKER_TESTING: "1"
        run: uv run pytest -v -m "contract"

      - name: Mutation Tests (core modules)
        env:
          TRANSIT_TRACKER_TESTING: "1"
        run: |
          uv run mutmut run || true
          echo ""
          echo "=== Mutation Testing Results ==="
          uv run mutmut results || true
          uv run python -c "
          import json, pathlib, sys
          p = pathlib.Path('mutants/mutmut-stats.json')
          if not p.exists():
              print('No mutation stats found'); sys.exit(0)
          d = json.loads(p.read_text())
          killed = sum(1 for v in d.values() if v == 'killed')
          survived = sum(1 for v in d.values() if v == 'survived')
          total = killed + survived
          if total == 0:
              print('No testable mutants'); sys.exit(0)
          score = killed / total * 100
          print(f'Mutation score: {score:.0f}% ({killed}/{total} killed)')
          "
        continue-on-error: true

      - name: Verify CLI Launch
        run: uv run python scripts/verify_launch.py

      - name: Build Package
        run: uv build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: transit-tracker-package
          path: dist/*
