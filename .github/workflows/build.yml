name: Build and Package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Tests (including Capture Validation)
        env:
          TRANSIT_TRACKER_TESTING: "1"
        run: uv run pytest -v -m "not docker"

      - name: Verify CLI Launch
        run: uv run python scripts/verify_launch.py

      - name: Build Package
        run: uv build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: transit-tracker-package
          path: dist/*
