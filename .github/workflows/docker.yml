name: Docker Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t transit-tracker .

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dev dependencies
        run: >
          uv sync --all-extras --dev
          --no-install-package pyobjc-framework-quartz
          --no-install-package pyobjc-framework-cocoa
          --no-install-package pyobjc-core
          --no-install-package rumps

      - name: Run container tests
        env:
          TRANSIT_TRACKER_TESTING: "1"
        run: uv run pytest -v -m docker tests/test_container.py
