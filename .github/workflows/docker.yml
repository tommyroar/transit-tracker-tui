name: Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t transit-tracker:test .

      - name: Start container
        run: |
          docker run -d \
            --name transit-tracker-test \
            -p 18000:8000 \
            -p 18080:8080 \
            transit-tracker:test

      - name: Wait for services to start
        run: |
          echo "Waiting for container services..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:18080/api/spec > /dev/null 2>&1; then
              echo "HTTP server ready after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Timeout waiting for services"
              docker logs transit-tracker-test
              exit 1
            fi
            sleep 1
          done

      - name: Test HTTP /api/spec returns valid JSON
        run: |
          response=$(curl -sf http://localhost:18080/api/spec)
          echo "$response" | python3 -c "import sys, json; json.load(sys.stdin); print('Valid JSON')"

      - name: Test WebSocket accepts connections
        run: |
          python3 -c "
          import asyncio, websockets, json

          async def test_ws():
              async with websockets.connect('ws://localhost:18000', open_timeout=5) as ws:
                  # Wait for heartbeat (sent every 10s)
                  msg = await asyncio.wait_for(ws.recv(), timeout=30)
                  data = json.loads(msg)
                  assert data.get('event') == 'heartbeat', f'Expected heartbeat, got: {data}'
                  print('WebSocket heartbeat received')

          asyncio.run(test_ws())
          "

      - name: Container logs (debug)
        if: failure()
        run: docker logs transit-tracker-test

      - name: Cleanup
        if: always()
        run: |
          docker stop transit-tracker-test 2>/dev/null || true
          docker rm -f transit-tracker-test 2>/dev/null || true
