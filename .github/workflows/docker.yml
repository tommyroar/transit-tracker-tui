name: Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t transit-tracker:test .

      - name: Verify image runs and entrypoint responds
        run: |
          # Smoke-test: container should start and print entrypoint banner.
          # Full integration tests (WebSocket heartbeat, /api/spec) require a
          # mounted config with real stop/route subscriptions, so they are left
          # to local `pytest -m docker` runs.
          docker run --rm transit-tracker:test sh -c "python -c 'import transit_tracker; print(\"OK\")'"
