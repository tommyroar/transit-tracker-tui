# Canonical ruff CI check — copy to <repo>/.github/workflows/lint.yml for Python repos
# that don't already run ruff inside an existing ci.yml. Checks only; never rewrites the
# branch (formatting is fixed locally via pre-commit). Mirrors tommybot's ruff steps.
name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Ruff lint
        run: uvx ruff check --output-format=github .
      - name: Ruff format check
        run: uvx ruff format --check .
