transit_tracker:
  base_url: "wss://tt.horner.tj/"
  time_display: "arrival"
  show_units: "short"
  list_mode: "sequential"
  scroll_headsigns: true
  stops:
    - stop_id: "st:1_8494"
      time_offset: "-7min"
      routes:
        - "st:40_100240"
    - stop_id: "st:1_11920"
      time_offset: "-9min"
      routes:
        - "st:1_100039"
  styles: []
  abbreviations: []
  num_panels: 2

# Reference Captures for Testing
captures:
  - time: "Sun Mar  8 14:34:43 PDT 2026"
    display: |
      14 Downtown Seattle {LIVE}11m
      554 Downtown Seattle {LIVE}15m
      14 Downtown Seattle {LIVE}41m
  - time: "Sun Mar  8 14:45:29 PDT 2026"
    display: |
      14 Downtown Seattle {LIVE}0m
      554 Downtown Seattle {LIVE}4m
      14 Downtown Seattle {LIVE}30m

# Current target for simulator matching
mock_state:
  - route: "14"
    headsign: "Downtown Seattle"
    diff: 0
    live: true
    color: "cyan"
  - route: "554"
    headsign: "Downtown Seattle"
    diff: 4
    live: true
    color: "yellow"
  - route: "14"
    headsign: "Downtown Seattle"
    diff: 30
    live: true
    color: "cyan"
